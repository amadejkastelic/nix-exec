name: Nix

on:
  workflow_call:
    inputs:
      command:
        required: true
        type: string
    secrets:
      CACHIX_AUTH_TOKEN:
        required: false

jobs:
  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
            extra-substituters = https://amadejkastelic.cachix.org
            extra-trusted-public-keys = amadejkastelic.cachix.org-1:EiQfTbiT0UKsynF4q3nbNYjNH6/l7zuhrNkQTuXmyOs=

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}
          restore-prefixes-first-match: nix-${{ runner.os }}
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}
          purge-created: 0
          purge-last-accessed: 0
          purge-primary-key: never

      - uses: cachix/cachix-action@v15
        with:
          name: amadejkastelic
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - run: ${{ inputs.command }} --accept-flake-config

      - name: Push build outputs to Cachix
        run: |
          nix-store --query --requisites ./result | cachix push amadejkastelic || true
