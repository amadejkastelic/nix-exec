name: Build

on:
  workflow_call:
    secrets:
      CACHIX_AUTH_TOKEN:
        required: false

jobs:
  build:
    strategy:
      matrix:
        package:
          - default
          - test

    uses: ./.github/workflows/nix.yaml
    with:
      command: nix build .#${{ matrix.package }} -L
    secrets: inherit
